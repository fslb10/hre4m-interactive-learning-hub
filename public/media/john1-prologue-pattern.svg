<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">John 1 prologue movement and response map</title><desc id="desc">Five connected panels show before creation, light and life, witness, reception or rejection, and Word made flesh, with verse ranges.</desc>
  <rect width="1200" height="675" rx="28" fill="#f7f3e8"/><text x="65" y="66" fill="#18234d" font-family="Georgia,serif" font-size="34">The prologue moves—and asks for a response</text><text x="65" y="98" fill="#66708d" font-family="Arial,sans-serif" font-size="17">Use the map to return to the verse ranges. It is not a substitute for the text.</text>
  <g font-family="Arial,sans-serif"><g transform="translate(52 180)"><rect width="200" height="250" rx="18" fill="#18234d"/><text x="24" y="43" fill="#f0c66f" font-size="15" font-weight="700">JOHN 1:1–5</text><text x="100" y="115" fill="#fff" font-family="Georgia,serif" font-size="29" text-anchor="middle">Before</text><text x="100" y="150" fill="#fff" font-family="Georgia,serif" font-size="29" text-anchor="middle">creation</text><text x="100" y="205" fill="#bfc7dd" font-size="16" text-anchor="middle">Word · creation</text><text x="100" y="228" fill="#bfc7dd" font-size="16" text-anchor="middle">life · light</text></g>
  <g transform="translate(276 180)"><rect width="200" height="250" rx="18" fill="#314b80"/><text x="24" y="43" fill="#ffe19a" font-size="15" font-weight="700">JOHN 1:4–5</text><circle cx="100" cy="130" r="54" fill="#f0c66f" opacity=".25"/><circle cx="100" cy="130" r="30" fill="#ffe8a8"/><text x="100" y="212" fill="#fff" font-family="Georgia,serif" font-size="27" text-anchor="middle">Light &amp; life</text></g>
  <g transform="translate(500 180)"><rect width="200" height="250" rx="18" fill="#e8dfc9"/><text x="24" y="43" fill="#654c22" font-size="15" font-weight="700">JOHN 1:6–8, 15</text><path d="M74 120h52M100 94v52" stroke="#18234d" stroke-width="5"/><path d="m125 120 30-23v46z" fill="#c58b2b"/><text x="100" y="201" fill="#18234d" font-family="Georgia,serif" font-size="29" text-anchor="middle">Witness</text><text x="100" y="229" fill="#5d6477" font-size="15" text-anchor="middle">points beyond self</text></g>
  <g transform="translate(724 180)"><rect width="200" height="250" rx="18" fill="#fffdf8" stroke="#c9c0ab" stroke-width="2"/><text x="24" y="43" fill="#7b5c25" font-size="15" font-weight="700">JOHN 1:9–13</text><path d="M100 80v78M100 119H55M100 119h45" stroke="#18234d" stroke-width="4"/><text x="55" y="190" fill="#8a4651" font-size="18" text-anchor="middle">reject</text><text x="145" y="190" fill="#24715d" font-size="18" text-anchor="middle">receive</text><text x="100" y="229" fill="#18234d" font-family="Georgia,serif" font-size="25" text-anchor="middle">Response</text></g>
  <g transform="translate(948 180)"><rect width="200" height="250" rx="18" fill="#d99573"/><text x="24" y="43" fill="#3c2023" font-size="15" font-weight="700">JOHN 1:14–18</text><path d="M66 98h68v68H66z" fill="#fff4e9" opacity=".9"/><circle cx="100" cy="111" r="16" fill="#d99573"/><path d="M75 160c8-28 42-28 50 0" fill="#d99573"/><text x="100" y="202" fill="#291923" font-family="Georgia,serif" font-size="28" text-anchor="middle">Word made</text><text x="100" y="233" fill="#291923" font-family="Georgia,serif" font-size="28" text-anchor="middle">flesh</text></g></g>
  <g stroke="#c58b2b" stroke-width="4" fill="none"><path d="M252 305h24M476 305h24M700 305h24M924 305h24"/></g><text x="600" y="505" fill="#18234d" font-family="Georgia,serif" font-size="27" text-anchor="middle">Revelation → witness → human response → embodied revelation</text><text x="600" y="553" fill="#687087" font-family="Arial,sans-serif" font-size="18" text-anchor="middle">Where does John alternate a claim about the Word with a response to the Word?</text>
</svg>
