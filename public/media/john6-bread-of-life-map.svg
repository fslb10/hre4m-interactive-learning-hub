<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Bread of Life sign-to-discourse map</title><desc id="desc">A bread symbol connects the feeding sign to Passover, manna, giver and gift, crowd response, and resurrection.</desc>
  <rect width="1200" height="675" rx="28" fill="#f7f3e8"/><text x="65" y="62" fill="#18234d" font-family="Georgia,serif" font-size="34">The sign opens into a discourse</text><text x="65" y="95" fill="#69718a" font-family="Arial,sans-serif" font-size="17">Follow each line back to John 6. The connections need textual evidence.</text>
  <g stroke="#c58b2b" stroke-width="4" fill="none"><path d="M600 330 285 190M600 330 915 190M600 330 275 500M600 330 925 500"/></g>
  <g transform="translate(472 205)"><ellipse cx="128" cy="125" rx="125" ry="88" fill="#d59a4b"/><path d="M35 120c45-50 145-62 190-15M48 150c55-38 135-44 170-8" stroke="#f6d99c" stroke-width="10" fill="none" stroke-linecap="round"/><text x="128" y="245" fill="#18234d" font-family="Georgia,serif" font-size="27" text-anchor="middle">Jesus: giver and gift</text><text x="128" y="272" fill="#6e5635" font-family="Arial,sans-serif" font-size="15" text-anchor="middle">vv. 32–35, 48–58</text></g>
  <g font-family="Arial,sans-serif"><g transform="translate(90 125)"><rect width="390" height="130" rx="18" fill="#18234d"/><text x="24" y="38" fill="#f0c66f" font-size="14" font-weight="700">FEEDING SIGN · VV. 1–15</text><text x="24" y="78" fill="#fff" font-family="Georgia,serif" font-size="26">Bodily hunger met</text><text x="24" y="106" fill="#bfc7dd" font-size="15">abundance · fragments gathered</text></g><g transform="translate(720 125)"><rect width="390" height="130" rx="18" fill="#314b80"/><text x="24" y="38" fill="#ffe19a" font-size="14" font-weight="700">PASSOVER + MANNA · VV. 4, 30–33, 49</text><text x="24" y="78" fill="#fff" font-family="Georgia,serif" font-size="26">Exodus memory</text><text x="24" y="106" fill="#d8deee" font-size="15">gift from heaven · mortality compared</text></g><g transform="translate(80 445)"><rect width="405" height="140" rx="18" fill="#fffdf8" stroke="#c9c0ab" stroke-width="2"/><text x="24" y="38" fill="#8b6425" font-size="14" font-weight="700">CROWD RESPONSE · VV. 25–34, 41–42, 52</text><text x="24" y="78" fill="#18234d" font-family="Georgia,serif" font-size="26">Seek · question · resist</text><text x="24" y="108" fill="#69718a" font-size="15">Will the sign lead to belief in the giver?</text></g><g transform="translate(715 445)"><rect width="405" height="140" rx="18" fill="#dcece5"/><text x="24" y="38" fill="#286b58" font-size="14" font-weight="700">LAST DAY · VV. 39–40, 44, 54</text><text x="24" y="78" fill="#18234d" font-family="Georgia,serif" font-size="26">Life and resurrection</text><text x="24" y="108" fill="#4f6f66" font-size="15">the horizon extends beyond the meal</text></g></g>
  <text x="600" y="636" fill="#18234d" font-family="Georgia,serif" font-size="23" text-anchor="middle">What is lost if compassion, belief, Eucharistic self-gift, or resurrection is removed?</text>
</svg>
