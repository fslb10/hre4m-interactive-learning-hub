<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">John 9 sight and resistance across the scenes</title><desc id="desc">Across seven scenes, the healed man’s testimony rises toward worship while the authorities’ resistance falls toward exclusion.</desc>
  <rect width="1200" height="675" rx="28" fill="#f7f3e8"/><text x="65" y="62" fill="#18234d" font-family="Georgia,serif" font-size="34">Two trajectories cross</text><text x="65" y="94" fill="#69718a" font-family="Arial,sans-serif" font-size="17">Trace the healed man’s testimony and the authorities’ resistance scene by scene.</text>
  <g stroke="#d4cbb8" stroke-width="2"><path d="M130 155v390M285 155v390M440 155v390M595 155v390M750 155v390M905 155v390M1060 155v390"/></g>
  <g font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#69718a"><text x="130" y="580">vv. 1–7</text><text x="285" y="580">vv. 8–12</text><text x="440" y="580">vv. 13–17</text><text x="595" y="580">vv. 18–23</text><text x="750" y="580">vv. 24–34</text><text x="905" y="580">vv. 35–38</text><text x="1060" y="580">vv. 39–41</text></g>
  <path d="M130 450C285 430 330 375 440 350S650 315 750 240 860 170 905 165" fill="none" stroke="#28735e" stroke-width="10" stroke-linecap="round"/><path d="M285 225C430 245 520 270 595 315S700 390 750 430 940 470 1060 490" fill="none" stroke="#9b4654" stroke-width="10" stroke-linecap="round"/>
  <g fill="#28735e"><circle cx="130" cy="450" r="13"/><circle cx="285" cy="420" r="13"/><circle cx="440" cy="350" r="13"/><circle cx="750" cy="240" r="13"/><circle cx="905" cy="165" r="13"/></g><g fill="#9b4654"><circle cx="285" cy="225" r="13"/><circle cx="440" cy="260" r="13"/><circle cx="595" cy="315" r="13"/><circle cx="750" cy="430" r="13"/><circle cx="1060" cy="490" r="13"/></g>
  <g font-family="Arial,sans-serif"><text x="150" y="424" fill="#28735e" font-size="16" font-weight="700">healed man</text><text x="780" y="202" fill="#28735e" font-size="16">testimony → worship</text><text x="305" y="202" fill="#9b4654" font-size="16" font-weight="700">authorities</text><text x="845" y="458" fill="#9b4654" font-size="16">resistance → exclusion</text></g>
  <rect x="500" y="285" width="190" height="76" rx="14" fill="#fffdf8" stroke="#c58b2b" stroke-width="3"/><text x="595" y="315" fill="#8b6425" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="700">PARENTS · VV. 18–23</text><text x="595" y="342" fill="#18234d" font-family="Georgia,serif" font-size="20" text-anchor="middle">fear holds the middle</text>
  <text x="600" y="625" fill="#18234d" font-family="Georgia,serif" font-size="23" text-anchor="middle">At what scene does pressure produce clearer testimony—and harder resistance?</text>
</svg>
