<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Enough, left over, still hungry visual hook</title><desc id="desc">Five loaves and two fish lead to twelve baskets and then a crowd containing a question mark.</desc>
  <rect width="1200" height="520" rx="28" fill="#142347"/><text x="65" y="65" fill="#f0c66f" font-family="Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="4">JOHN 6 · SCARCITY, ABUNDANCE, SEEKING</text>
  <g transform="translate(80 155)" fill="#dca85a"><g><ellipse cx="55" cy="70" rx="44" ry="25"/><ellipse cx="145" cy="48" rx="44" ry="25"/><ellipse cx="145" cy="105" rx="44" ry="25"/><ellipse cx="235" cy="70" rx="44" ry="25"/><ellipse cx="55" cy="128" rx="44" ry="25"/></g><g fill="#87a9bf"><path d="M55 195c35-35 75-35 110 0-35 35-75 35-110 0zm110 0 35-24v48z"/><path d="M183 195c35-35 75-35 110 0-35 35-75 35-110 0zm110 0 35-24v48z"/></g><text x="165" y="278" fill="#c4cce0" font-family="Arial,sans-serif" font-size="18" text-anchor="middle">five loaves · two fish</text></g>
  <path d="M415 260h75m-15-15 18 15-18 15" stroke="#f0c66f" stroke-width="5" fill="none"/><g transform="translate(535 145)" stroke="#dca85a" stroke-width="5" fill="none"><path d="M0 20h70l-10 72H10zM90 20h70l-10 72h-50zM180 20h70l-10 72h-50zM0 120h70l-10 72H10zM90 120h70l-10 72h-50zM180 120h70l-10 72h-50zM0 220h70l-10 72H10zM90 220h70l-10 72h-50zM180 220h70l-10 72H190z"/></g><text x="660" y="468" fill="#c4cce0" font-family="Arial,sans-serif" font-size="18" text-anchor="middle">twelve baskets remain</text>
  <path d="M825 260h70m-15-15 18 15-18 15" stroke="#f0c66f" stroke-width="5" fill="none"/><g transform="translate(930 155)" fill="#7383aa"><circle cx="50" cy="70" r="45"/><circle cx="145" cy="55" r="45"/><circle cx="115" cy="135" r="50"/><circle cx="200" cy="125" r="42"/><path d="M5 240c5-75 230-75 240 0z"/></g><text x="1052" y="305" fill="#fff" font-family="Georgia,serif" font-size="110" text-anchor="middle">?</text><text x="1052" y="468" fill="#f0c66f" font-family="Arial,sans-serif" font-size="18" text-anchor="middle">why are they still seeking?</text>
